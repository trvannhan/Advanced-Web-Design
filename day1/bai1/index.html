<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Products Design</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="title-section">
                <h2>WOMEN'S PRODUCTS</h2>
            </div>
            <nav class="navigation">
                <ul>
                    <li><a href="#" class="active">All</a></li>
                    <li><a href="#">Clothings</a></li>
                    <li><a href="#">Bags</a></li>
                    <li><a href="#">Shoes</a></li>
                    <li><a href="#">Watches</a></li>
                    <li><a href="#">Googles</a></li>
                </ul>
            </nav>
        </header>

        <div class="product-grid">

            <div class="product-card">
                <div class="product-image">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRA6Z1bKJnxTbuajAwDQK8tsBobEZ11KfTgcA&s"
                        alt="Women Bags">
                </div>
                <div class="product-info">
                    <h3>Women Bags</h3>
                    <div class="product-action">
                        <div class="price">
                            <span class="old-price">€100.00</span>
                            <span class="new-price">€60.00</span>
                        </div>
                        <button class="add-btn">ADD TO CART</button>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQju2W4t_W6z5rh5fzHMF4w37Gu3YhQhdhE_g&s" alt="Google">
                </div>
                <div class="product-info">
                    <h3>Google</h3>
                    <div class="product-action">
                        <div class="price">
                            <span class="new-price">€25.00</span>
                        </div>
                        <button class="add-btn">ADD TO CART</button>
                    </div>
                </div>
            </div>

            <div class="feature-banner">
                <div class="banner-content">
                    <h1>FOR WOMEN</h1>
                    <button class="view-all-btn">VIEW ALL</button>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
