<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        /* Màu nền */
        body {
            background-color: #5F9EA0;
            padding: 20px;
            font-family: sans-serif;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 2px;
        }

        input {
            margin-bottom: 10px;
            width: 300px !important;
        }

        /* Style cho nút bấm */
        .btn-action {
            background: white;
            color: red;
            border: 1px solid #ccc;
            font-weight: bold;
        }

        /* Style cho bảng màu */
        table {
            background-color: #00FFFF;
            border: 2px solid #333 !important;
        }

        th,
        td {
            border: 1px solid #333 !important;
        }

        thead {
            background-color: #00CED1;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="form-group">
            <label>Fullname_Customer</label><br>
            <input type="text" id="name" class="form-control">

            <label>Id_Pro</label><br>
            <input type="text" id="id" class="form-control">

            <label>Name_Pro</label><br>
            <input type="text" id="prdname" class="form-control">

            <label>Quantity_Pro</label><br>
            <input type="text" id="qty" class="form-control">

            <label>Price_Pro</label><br>
            <input type="text" id="price" class="form-control">
        </div>

        <button class="btn btn-action" onclick="save()">Save</button>
        <button class="btn btn-action" onclick="show()">Show</button>
        <button class="btn btn-action" onclick="reset()">Reset</button>

        <br><br>

        <table class="table table-bordered text-center">
            <thead>
                <tr>
                    <th>Auto increment</th>
                    <th>Customer Name</th>
                    <th>Id</th>
                    <th>Product Name</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="tbl">
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>

</html>
